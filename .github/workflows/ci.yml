name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Verify lockfile
        run: uv lock --check

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run offline test suite
        env:
          SKILL_RAG_LOCAL_FILES_ONLY: "1"
        run: uv run pytest -q

      - name: Verify dry-run install
        run: make install-smoke

      - name: Build distribution
        run: uv build
